<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SA Executive Dashboard — Simpliaxis</title>

<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body data-theme="dark">

<div id="toastWrap" class="toast-wrap"></div>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">SA</div>
      <div class="brand-text">
        <b>Simpliaxis</b>
        <small>Executive Dashboard</small>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-toggle-wrap">
      <button id="sidebarToggle"><i class="fa-solid fa-angles-left"></i></button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-wrap">
    <header class="topbar">
      <div class="topbar-left">
        <button id="sidebarMobileToggle" class="icon-btn"><i class="fa-solid fa-bars"></i></button>
        <i class="fa-solid fa-tower-broadcast" style="color:var(--accent)"></i>
        <h2 id="pageTitle">SA Dashboard</h2>
        <span class="status-pill"><span id="connectionDot" class="status-dot"></span> <span id="connectionLabel">Connecting…</span></span>
      </div>

      <div class="topbar-mid">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="globalSearch" placeholder="Search records…" />
        </div>
        <div class="clock-block">
          <b id="liveClock">--:--:--</b>
          <span id="currentDate">—</span>
        </div>
        <div class="clock-block">
          <b id="lastRefresh">—</b>
          <span>Last refresh</span>
        </div>
      </div>

      <div class="topbar-right">
        <button class="icon-btn" id="refreshBtn" title="Refresh data"><i class="fa-solid fa-rotate"></i></button>

        <div style="position:relative;">
          <button class="icon-btn" id="notifBtn" title="Notifications"><i class="fa-solid fa-bell"></i><span class="dot-badge"></span></button>
          <div class="dropdown-panel" id="notifPanel">
            <h4>Notifications</h4>
            <div class="notif-item"><i class="fa-solid fa-arrow-trend-up"></i><div><b>Revenue up 6.1%</b>vs previous period</div></div>
            <div class="notif-item"><i class="fa-solid fa-triangle-exclamation"></i><div><b>3 refunds pending</b>review for over 5 days</div></div>
            <div class="notif-item"><i class="fa-solid fa-star"></i><div><b>Elite plan leads</b>up in APAC this week</div></div>
          </div>
        </div>

        <div style="position:relative;">
          <button class="icon-btn" id="exportBtn" title="Export"><i class="fa-solid fa-download"></i></button>
          <div class="dropdown-panel" id="exportMenu">
            <h4>Export current view</h4>
            <button data-type="pdf"><i class="fa-solid fa-file-pdf"></i> Export as PDF</button>
            <button data-type="excel"><i class="fa-solid fa-file-excel"></i> Export as Excel</button>
            <button data-type="csv"><i class="fa-solid fa-file-csv"></i> Export as CSV</button>
            <button data-type="png"><i class="fa-solid fa-file-image"></i> Export as PNG</button>
            <button data-type="print"><i class="fa-solid fa-print"></i> Print</button>
          </div>
        </div>

        <button class="icon-btn" id="fullscreenBtn" title="Full screen"><i class="fa-solid fa-expand"></i></button>
        <button class="icon-btn" id="themeToggle" title="Toggle theme"><i class="fa-solid fa-sun"></i></button>
        <button class="icon-btn" id="settingsBtn" title="Settings"><i class="fa-solid fa-gear"></i></button>
        <div class="avatar">SA</div>
      </div>
    </header>

    <main class="content-scroll" id="mainContent"></main>
  </div>
</div>

<!-- App scripts (order matters) -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/data.js"></script>
<script src="js/charts.js"></script>
<script src="js/components.js"></script>
<script src="js/exporter.js"></script>
<script src="js/mod-dashboard.js"></script>
<script src="js/mod-payments.js"></script>
<script src="js/mod-leads.js"></script>
<script src="js/mod-marketing.js"></script>
<script src="js/mod-premium-refund.js"></script>
<script src="js/mod-settings-generic.js"></script>
<script src="js/app.js"></script>
<script src="js/mod-settings-generic.js"></script>
<script src="js/smoke-effect.js"></script>
<script src="js/app.js"></script>

</body>
</html>
